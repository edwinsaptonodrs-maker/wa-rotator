<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Dashboard WA Rotator</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
}

header {
  padding: 15px;
  background: #020617;
  display: flex;
  justify-content: space-between;
}

.container {
  padding: 20px;
}

.card {
  background: #020617;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
}

input, textarea {
  width: 100%;
  padding: 8px;
  margin-top: 8px;
  margin-bottom: 10px;
  border-radius: 6px;
  border: 1px solid #1e293b;
  background: #020617;
  color: white;
}

button {
  padding: 8px 12px;
  border: none;
  border-radius: 6px;
  background: #3b82f6;
  color: white;
  cursor: pointer;
}

.danger {
  background: #ef4444;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill,minmax(250px,1fr));
  gap: 10px;
}

.user {
  background: #020617;
  padding: 12px;
  border-radius: 10px;
}

.badge {
  padding: 3px 6px;
  border-radius: 4px;
  font-size: 12px;
}

.on { background: green; }
.off { background: red; }

/* TOAST */
#toast {
  position: fixed;
  top: 20px;
  right: 20px;
  padding: 10px 15px;
  border-radius: 6px;
  color: white;
  opacity: 0;
  transition: 0.3s;
}
</style>
</head>

<body>

<header>
  <b>WA Rotator Dashboard</b>
  <button onclick="logout()">Logout</button>
</header>

<div class="container">

<div class="card">
  <h3>Tambah CS</h3>
  <input id="nama" placeholder="Nama">
  <input id="wa" placeholder="628xxxx">
  <button onclick="addUser()">Tambah</button>
</div>

<div class="card" id="wa-setting">
  <h3>Pesan WhatsApp</h3>
  <textarea id="waText"></textarea>
  <button onclick="saveText()">Simpan</button>
</div>

<div id="list" class="grid"></div>

</div>

<div id="toast"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore, collection, addDoc, getDocs, doc,
  updateDoc, getDoc, deleteDoc, setDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
  getAuth, onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBvot2y7CY0oTfPs-eanZI73X_r3vdZ_Bc",
  authDomain: "wa-rotator.firebaseapp.com",
  projectId: "wa-rotator"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let currentUser;
let userRole = "staff";

// 🔔 TOAST
window.showToast = function(msg, type="success") {
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.style.background = type === "error" ? "#dc2626" : "#16a34a";
  t.style.opacity = 1;
  setTimeout(()=> t.style.opacity = 0, 2000);
}

// 🔐 LOGIN CHECK
onAuthStateChanged(auth, async user => {
  if (!user) {
    window.location.href = "/login.html";
    return;
  }

  currentUser = user;
  await loadRole();
  handleAccess();
  loadUsers();
  loadText();
});

// 🔐 ROLE
async function loadRole() {
  const ref = doc(db, "roles", currentUser.uid);
  const snap = await getDoc(ref);
  if (snap.exists()) userRole = snap.data().role;
}

// 🔒 ACCESS
function handleAccess() {
  if (userRole !== "admin") {
    document.getElementById("wa-setting").style.display = "none";
  }
}

// ➕ ADD USER
window.addUser = async function() {
  const nama = document.getElementById("nama").value;
  const wa = document.getElementById("wa").value;

  try {
    await addDoc(collection(db, "users"), {
      nama,
      wa_number: wa,
      active: true,
      total_leads: 0,
      owner_uid: currentUser.uid
    });

    showToast("Berhasil tambah CS");
    loadUsers();

  } catch {
    showToast("Gagal tambah CS", "error");
  }
};

// 📋 LOAD USERS
async function loadUsers() {
  const snap = await getDocs(collection(db, "users"));
  const list = document.getElementById("list");
  list.innerHTML = "";

  snap.forEach(d => {
    const data = d.data();

    if (userRole !== "admin" && data.owner_uid !== currentUser.uid) return;

    list.innerHTML += `
      <div class="user">
        <b>${data.nama}</b><br>
        ${data.wa_number}<br>
        Leads: ${data.total_leads || 0}<br><br>

        <span class="badge ${data.active ? 'on':'off'}">
          ${data.active ? 'ON':'OFF'}
        </span><br><br>

        <button onclick="toggle('${d.id}', ${data.active})">Toggle</button>

        ${userRole==="admin" ? `
          <button class="danger" onclick="deleteUser('${d.id}')">Hapus</button>
        `:""}
      </div>
    `;
  });
}

// 🔄 TOGGLE
window.toggle = async function(id, status) {
  try {
    await updateDoc(doc(db, "users", id), { active: !status });
    showToast("Status diubah");
    loadUsers();
  } catch {
    showToast("Gagal update", "error");
  }
};

// 🗑 DELETE
window.deleteUser = async function(id) {
  if (!confirm("Hapus CS?")) return;

  try {
    await deleteDoc(doc(db, "users", id));
    showToast("Berhasil dihapus");
    loadUsers();
  } catch {
    showToast("Gagal hapus", "error");
  }
};

// 💬 SAVE TEXT
window.saveText = async function() {
  const text = document.getElementById("waText").value;

  try {
    await setDoc(doc(db, "settings", "config"), { wa_text: text });
    showToast("Pesan disimpan");
  } catch {
    showToast("Gagal simpan", "error");
  }
};

// 📥 LOAD TEXT
async function loadText() {
  const ref = doc(db, "settings", "config");
  const snap = await getDoc(ref);
  if (snap.exists()) {
    document.getElementById("waText").value = snap.data().wa_text;
  }
}

// 🚪 LOGOUT
window.logout = () => signOut(auth);

</script>

</body>
</html>
