<!DOCTYPE html>
<html>
<head>
  <title>Dashboard CS</title>
</head>
<body>
  <h2>Dashboard</h2>

  <input id="nama" placeholder="Nama"><br><br>
  <input id="wa" placeholder="Nomor WA"><br><br>
  <label>
    Aktif:
    <input type="checkbox" id="active">
  </label><br><br>

  <button onclick="save()">Simpan</button>

  <p id="status"></p>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBvot2y7CY0oTfPs-eanZI73X_r3vdZ_Bc",
      authDomain: "wa-rotator.firebaseapp.com",
      projectId: "wa-rotator",
      storageBucket: "wa-rotator.firebasestorage.app",
      messagingSenderId: "505170669713",
      appId: "1:505170669713:web:e03b27c58d4f83446c8f30"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    window.save = async function() {
      const nama = document.getElementById("nama").value;
      const wa = document.getElementById("wa").value;
      const active = document.getElementById("active").checked;

      await addDoc(collection(db, "users"), {
        nama: nama,
        wa_number: wa,
        active: active,
        total_leads: 0
      });

      document.getElementById("status").innerText = "Tersimpan!";
    }
  </script>
</body>
</html>
