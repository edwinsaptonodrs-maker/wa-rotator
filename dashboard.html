<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Dashboard WA Rotator</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
}

header {
  padding: 15px;
  background: #020617;
  display: flex;
  justify-content: space-between;
}

.container {
  padding: 20px;
}

.card {
  background: #020617;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
}

input {
  width: 100%;
  padding: 8px;
  margin-top: 8px;
  margin-bottom: 10px;
  border-radius: 6px;
  border: 1px solid #1e293b;
  background: #020617;
  color: white;
}

button {
  padding: 8px 12px;
  border: none;
  border-radius: 6px;
  background: #3b82f6;
  color: white;
  cursor: pointer;
}

.danger { background: #ef4444; }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill,minmax(250px,1fr));
  gap: 10px;
}

.user {
  background: #020617;
  padding: 12px;
  border-radius: 10px;
}

.badge {
  padding: 3px 6px;
  border-radius: 4px;
  font-size: 12px;
}

.on { background: green; }
.off { background: red; }

#toast {
  position: fixed;
  top: 20px;
  right: 20px;
  padding: 10px;
  border-radius: 6px;
  color: white;
  opacity: 0;
  transition: 0.3s;
}
</style>
</head>

<body>

<header>
  <b>Dashboard</b>
  <button onclick="logout()">Logout</button>
</header>

<div class="container">

<!-- ADMIN: TAMBAH USER -->
<div class="card" id="admin-panel">
  <h3>Tambah Staff</h3>
  <input id="newEmail" placeholder="Email">
  <input id="newPassword" placeholder="Password">
  <button onclick="createStaff()">Buat Akun</button>
</div>

<!-- STAFF: INPUT WA -->
<div class="card">
  <h3>Nomor WhatsApp</h3>
  <input id="nama" placeholder="Nama CS">
  <input id="wa" placeholder="628xxxx">
  <button onclick="addUser()">Simpan Nomor</button>
</div>

<!-- LIST -->
<div id="list" class="grid"></div>

</div>

<div id="toast"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore, collection, addDoc, getDocs, doc,
  updateDoc, getDoc, deleteDoc, setDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
  getAuth, onAuthStateChanged, signOut,
  createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// 🔥 CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyBvot2y7CY0oTfPs-eanZI73X_r3vdZ_Bc",
  authDomain: "wa-rotator.firebaseapp.com",
  projectId: "wa-rotator"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// SECOND AUTH (BIAR ADMIN TIDAK LOGOUT)
const secondApp = initializeApp(firebaseConfig, "Secondary");
const secondAuth = getAuth(secondApp);

let currentUser;
let userRole = "staff";

// 🔔 TOAST
window.showToast = function(msg, type="success") {
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.style.background = type === "error" ? "#dc2626" : "#16a34a";
  t.style.opacity = 1;
  setTimeout(()=> t.style.opacity = 0, 2000);
}

// 🔐 LOGIN CHECK
onAuthStateChanged(auth, async user => {
  if (!user) {
    window.location.href = "/login.html";
    return;
  }

  currentUser = user;

  await loadRole();
  handleAccess();
  loadUsers();
});

// 🔐 LOAD ROLE
async function loadRole() {
  const ref = doc(db, "roles", currentUser.uid);
  const snap = await getDoc(ref);
  if (snap.exists()) userRole = snap.data().role;
}

// 🔒 BATASI ADMIN PANEL
function handleAccess() {
  if (userRole !== "admin") {
    document.getElementById("admin-panel").style.display = "none";
  }
}

// ➕ CREATE STAFF (TANPA WA)
window.createStaff = async function() {
  const email = document.getElementById("newEmail").value;
  const password = document.getElementById("newPassword").value;

  if (!email || !password) {
    showToast("Isi semua field", "error");
    return;
  }

  try {
    const userCredential = await createUserWithEmailAndPassword(secondAuth, email, password);
    const uid = userCredential.user.uid;

    await setDoc(doc(db, "roles", uid), {
      role: "staff"
    });

    showToast("Akun berhasil dibuat");

  } catch (e) {
    showToast("Gagal buat akun", "error");
  }
};

// ➕ STAFF INPUT WA (1 USER = 1 DATA)
window.addUser = async function() {

  const nama = document.getElementById("nama").value;
  const wa = document.getElementById("wa").value;

  if (!nama || !wa) {
    showToast("Isi semua field", "error");
    return;
  }

  const snapshot = await getDocs(collection(db, "users"));

  let exists = false;

  snapshot.forEach(d => {
    if (d.data().owner_uid === currentUser.uid) {
      exists = true;
    }
  });

  if (exists) {
    showToast("Kamu sudah punya nomor", "error");
    return;
  }

  try {
    await addDoc(collection(db, "users"), {
      nama,
      wa_number: wa,
      active: true,
      total_leads: 0,
      owner_uid: currentUser.uid
    });

    showToast("Nomor berhasil disimpan");
    loadUsers();

  } catch {
    showToast("Gagal simpan", "error");
  }
};

// 📋 LOAD USERS
async function loadUsers() {
  const snap = await getDocs(collection(db, "users"));
  const list = document.getElementById("list");
  list.innerHTML = "";

  snap.forEach(d => {
    const data = d.data();

    if (userRole !== "admin" && data.owner_uid !== currentUser.uid) return;

    list.innerHTML += `
      <div class="user">
        <b>${data.nama}</b><br>
        ${data.wa_number}<br>
        Leads: ${data.total_leads || 0}<br><br>

        <span class="badge ${data.active ? 'on':'off'}">
          ${data.active ? 'ON':'OFF'}
        </span><br><br>

        <button onclick="toggle('${d.id}', ${data.active})">Toggle</button>

        ${userRole==="admin" ? `
          <button class="danger" onclick="deleteUser('${d.id}')">Hapus</button>
        `:""}
      </div>
    `;
  });
}

// 🔄 TOGGLE
window.toggle = async function(id, status) {
  await updateDoc(doc(db, "users", id), {
    active: !status
  });
  showToast("Status diubah");
  loadUsers();
};

// 🗑 DELETE
window.deleteUser = async function(id) {
  if (!confirm("Hapus data ini?")) return;

  await deleteDoc(doc(db, "users", id));
  showToast("Dihapus");
  loadUsers();
};

// 🚪 LOGOUT
window.logout = () => signOut(auth);

</script>

</body>
</html>
