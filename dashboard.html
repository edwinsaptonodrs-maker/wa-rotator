<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Dashboard WA Rotator</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
  color: white;
  margin: 0;
}

header {
  padding: 16px 24px;
  background: #020617;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid #1e293b;
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #020617;
  border: 1px solid #1e293b;
  padding: 14px;
  border-radius: 10px;
  margin-bottom: 14px;
}

.row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

input, textarea {
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #1e293b;
  background: #020617;
  color: white;
  flex: 1;
}

button {
  padding: 10px 14px;
  border: none;
  border-radius: 8px;
  background: #3b82f6;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #2563eb;
}

.danger {
  background: #ef4444;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill,minmax(220px,1fr));
  gap: 10px;
}

.user {
  background: #020617;
  border: 1px solid #1e293b;
  padding: 12px;
  border-radius: 10px;
  font-size: 13px;
}

.badge {
  padding: 3px 6px;
  border-radius: 4px;
  font-size: 11px;
}

.on { background: #16a34a; }
.off { background: #dc2626; }

#toast {
  position: fixed;
  top: 20px;
  right: 20px;
  padding: 10px 14px;
  border-radius: 8px;
  color: white;
  opacity: 0;
  transition: 0.3s;
}
</style>
</head>

<body>

<header>
  <b>WA Rotator</b>
  <button onclick="logout()">Logout</button>
</header>

<div class="container">

<!-- ADMIN -->
<div class="card" id="admin-panel" style="display:none;">
  <b>Tambah Staff</b>
  <div class="row">
    <input id="newEmail" placeholder="Email">
    <input id="newPassword" placeholder="Password">
    <button onclick="createStaff()">Buat</button>
  </div>
</div>

<!-- TEXT -->
<div class="card" id="text-panel" style="display:none;">
  <b>Pesan WA</b>
  <textarea id="waText" rows="2"></textarea>
  <button onclick="saveText()">Simpan</button>
</div>

<!-- INPUT -->
<div class="card">
  <b>Tambah Nomor</b>
  <div class="row">
    <input id="nama" placeholder="Nama CS">
    <input id="wa" placeholder="628xxxx">
    <button onclick="addUser()">Tambah</button>
  </div>
</div>

<!-- LIST -->
<div id="list" class="grid"></div>

</div>

<div id="toast"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore, collection, addDoc, getDocs, doc,
  updateDoc, getDoc, deleteDoc, setDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
  getAuth, onAuthStateChanged, signOut,
  createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBvot2y7CY0oTfPs-eanZI73X_r3vdZ_Bc",
  authDomain: "wa-rotator.firebaseapp.com",
  projectId: "wa-rotator"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const secondApp = initializeApp(firebaseConfig, "Secondary");
const secondAuth = getAuth(secondApp);

let currentUser;
let userRole = "staff";

// TOAST
window.showToast = function(msg, type="success") {
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.style.background = type === "error" ? "#dc2626" : "#16a34a";
  t.style.opacity = 1;
  setTimeout(()=> t.style.opacity = 0, 2000);
};

// AUTH
onAuthStateChanged(auth, async user => {
  if (!user) {
    window.location.href = "/login.html";
    return;
  }

  currentUser = user;

  await loadRole();
  handleAccess();
  loadUsers();
  loadText();
});

// ROLE
async function loadRole() {
  const snap = await getDoc(doc(db,"roles",currentUser.uid));
  if (snap.exists()) userRole = snap.data().role;
}

// ACCESS
function handleAccess() {
  if (userRole === "admin") {
    admin-panel.style.display = "block";
    text-panel.style.display = "block";
  }
}

// CREATE STAFF
window.createStaff = async () => {
  const email = document.getElementById("newEmail").value;
  const password = document.getElementById("newPassword").value;

  if (!email || !password) return showToast("Isi semua field","error");

  try {
    const user = await createUserWithEmailAndPassword(secondAuth,email,password);
    await setDoc(doc(db,"roles",user.user.uid),{role:"staff"});
    showToast("Berhasil dibuat");
  } catch {
    showToast("Gagal","error");
  }
};

// FIX UTAMA DI SINI
window.addUser = async () => {
  const nama = document.getElementById("nama").value.trim();
  const wa = document.getElementById("wa").value.trim();

  if (!nama || !wa) return showToast("Isi semua field","error");
  if (!/^[0-9]+$/.test(wa)) return showToast("Harus angka","error");
  if (!wa.startsWith("62")) return showToast("Harus 62","error");

  try {
    await addDoc(collection(db,"users"), {
      nama,
      wa_number: wa,
      active:true,
      total_leads:0,
      owner_uid: currentUser.uid
    });

    showToast("Berhasil ditambahkan");

    document.getElementById("nama").value = "";
    document.getElementById("wa").value = "";

    loadUsers();

  } catch(e) {
    console.error(e);
    showToast("Gagal","error");
  }
};

// LOAD USERS
async function loadUsers(){
  const snap = await getDocs(collection(db,"users"));
  list.innerHTML="";

  snap.forEach(d=>{
    const data=d.data();
    if(userRole!=="admin" && data.owner_uid!==currentUser.uid) return;

    list.innerHTML+=`
    <div class="user">
      <b>${data.nama}</b><br>
      ${data.wa_number}<br>
      Leads: ${data.total_leads||0}<br><br>

      <span class="badge ${data.active?'on':'off'}">
        ${data.active?'ON':'OFF'}
      </span><br><br>

      <button onclick="toggle('${d.id}',${data.active})">Toggle</button>
      ${userRole==="admin"?`<button class="danger" onclick="deleteUser('${d.id}')">X</button>`:""}
    </div>`;
  });
}

// TOGGLE
window.toggle = async(id,status)=>{
  await updateDoc(doc(db,"users",id),{active:!status});
  loadUsers();
};

// DELETE
window.deleteUser = async(id)=>{
  if(!confirm("Hapus?")) return;
  await deleteDoc(doc(db,"users",id));
  loadUsers();
};

// TEXT
window.saveText = async()=>{
  await setDoc(doc(db,"settings","config"),{wa_text:waText.value});
  showToast("Disimpan");
};

async function loadText(){
  const snap = await getDoc(doc(db,"settings","config"));
  if(snap.exists()) waText.value = snap.data().wa_text || "";
}

// LOGOUT
window.logout = ()=>signOut(auth);

</script>

</body>
</html>
