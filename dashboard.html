<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Dashboard WA Rotator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
    }

    header {
      padding: 16px 24px;
      background: #020617;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #1e293b;
    }

    h1 {
      font-size: 20px;
      margin: 0;
    }

    button {
      background: #3b82f6;
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }

    .container {
      padding: 24px;
    }

    .card {
      background: #020617;
      border: 1px solid #1e293b;
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 16px;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #1e293b;
      background: #020617;
      color: white;
      margin-top: 8px;
      margin-bottom: 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 16px;
    }

    .user-card {
      background: #020617;
      border: 1px solid #1e293b;
      padding: 16px;
      border-radius: 12px;
    }

    .badge {
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 12px;
    }

    .active {
      background: #16a34a;
    }

    .inactive {
      background: #dc2626;
    }
  </style>
</head>

<body>

<header>
  <h1>WA Rotator Dashboard</h1>
  <button onclick="logout()">Logout</button>
</header>

<div class="container">

  <!-- ADD CS -->
  <div class="card">
    <h3>Tambah CS</h3>
    <input id="nama" placeholder="Nama CS">
    <input id="wa" placeholder="Nomor WA (628xxxx)">
    <button onclick="addUser()">Tambah</button>
  </div>

  <!-- WA TEXT SETTING -->
  <div class="card" id="wa-setting">
    <h3>Setting Pesan WhatsApp</h3>
    <textarea id="waText" rows="3"></textarea>
    <button onclick="saveText()">Simpan</button>
  </div>

  <!-- LIST CS -->
  <div class="grid" id="list"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore, collection, addDoc, getDocs, doc,
  updateDoc, getDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
  getAuth, onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// 🔥 CONFIG KAMU
const firebaseConfig = {
  apiKey: "AIzaSyBvot2y7CY0oTfPs-eanZI73X_r3vdZ_Bc",
  authDomain: "wa-rotator.firebaseapp.com",
  projectId: "wa-rotator",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let currentUser;
let userRole = "staff";

onAuthStateChanged(auth, async user => {
  if (!user) {
    window.location.href = "/login.html";
    return;
  }

  currentUser = user;

  await loadRole();
  handleAccess();
  loadUsers();
  loadText();
});

// 🔐 LOAD ROLE
async function loadRole() {
  const ref = doc(db, "roles", currentUser.uid);
  const snap = await getDoc(ref);

  if (snap.exists()) {
    userRole = snap.data().role;
  }
}

// 🔒 HIDE FITUR ADMIN
function handleAccess() {
  if (userRole !== "admin") {
    document.getElementById("wa-setting").style.display = "none";
  }
}

// ➕ TAMBAH USER
async function addUser() {
  const nama = document.getElementById("nama").value;
  const wa = document.getElementById("wa").value;

  await addDoc(collection(db, "users"), {
    nama,
    wa_number: wa,
    active: true,
    total_leads: 0,
    owner_uid: currentUser.uid
  });

  loadUsers();
}

// 🔄 LOAD USERS
async function loadUsers() {
  const snapshot = await getDocs(collection(db, "users"));
  const list = document.getElementById("list");
  list.innerHTML = "";

  snapshot.forEach(docSnap => {
    const data = docSnap.data();

    if (userRole !== "admin" && data.owner_uid !== currentUser.uid) return;

    list.innerHTML += `
      <div class="user-card">
        <b>${data.nama}</b><br>
        ${data.wa_number}<br><br>
        Leads: ${data.total_leads || 0}<br><br>

        Status:
        <span class="badge ${data.active ? 'active' : 'inactive'}">
          ${data.active ? 'ON' : 'OFF'}
        </span>
        <br><br>

        <button onclick="toggle('${docSnap.id}', ${data.active})">
          Toggle
        </button>
      </div>
    `;
  });
}

// 🔘 TOGGLE ON/OFF
window.toggle = async (id, status) => {
  await updateDoc(doc(db, "users", id), {
    active: !status
  });

  loadUsers();
};

// 💬 SAVE WA TEXT
async function saveText() {
  const text = document.getElementById("waText").value;

  await updateDoc(doc(db, "settings", "wa"), {
    text
  });

  alert("Tersimpan");
}

// 📥 LOAD TEXT
async function loadText() {
  const ref = doc(db, "settings", "wa");
  const snap = await getDoc(ref);

  if (snap.exists()) {
    document.getElementById("waText").value = snap.data().text;
  }
}

// 🚪 LOGOUT
window.logout = () => {
  signOut(auth);
};

</script>

</body>
</html>
