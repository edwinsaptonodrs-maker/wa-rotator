<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Dashboard WA Rotator</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
}

header {
  padding: 15px;
  background: #020617;
  display: flex;
  justify-content: space-between;
}

.container {
  padding: 20px;
  max-width: 1000px;
  margin: auto;
}

.card {
  background: #020617;
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 12px;
}

.row {
  display: flex;
  gap: 10px;
}

input, textarea {
  padding: 8px;
  border-radius: 6px;
  border: 1px solid #1e293b;
  background: #020617;
  color: white;
}

input {
  flex: 1;
}

textarea {
  width: 100%;
}

button {
  padding: 8px 12px;
  border: none;
  border-radius: 6px;
  background: #3b82f6;
  color: white;
  cursor: pointer;
}

.danger { background: #ef4444; }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill,minmax(220px,1fr));
  gap: 10px;
}

.user {
  background: #020617;
  padding: 10px;
  border-radius: 8px;
  font-size: 13px;
}

.badge {
  padding: 3px 6px;
  border-radius: 4px;
  font-size: 11px;
}

.on { background: green; }
.off { background: red; }

#toast {
  position: fixed;
  top: 20px;
  right: 20px;
  padding: 10px;
  border-radius: 6px;
  color: white;
  opacity: 0;
  transition: 0.3s;
}
</style>
</head>

<body>

<header>
  <b>Dashboard</b>
  <button onclick="logout()">Logout</button>
</header>

<div class="container">

<!-- ADMIN PANEL -->
<div class="card" id="admin-panel" style="display:none;">
  <b>Tambah Staff</b>
  <div class="row">
    <input id="newEmail" placeholder="Email">
    <input id="newPassword" placeholder="Password">
    <button onclick="createStaff()">Buat</button>
  </div>
</div>

<!-- SETTING TEXT WA -->
<div class="card" id="text-panel" style="display:none;">
  <b>Pesan WhatsApp</b>
  <textarea id="waText" rows="2"></textarea>
  <button onclick="saveText()">Simpan</button>
</div>

<!-- INPUT WA -->
<div class="card">
  <b>Tambah Nomor</b>
  <div class="row">
    <input id="nama" placeholder="Nama CS">
    <input id="wa" placeholder="628xxxx">
    <button onclick="addUser()">Tambah</button>
  </div>
</div>

<!-- LIST -->
<div id="list" class="grid"></div>

</div>

<div id="toast"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore, collection, addDoc, getDocs, doc,
  updateDoc, getDoc, deleteDoc, setDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
  getAuth, onAuthStateChanged, signOut,
  createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBvot2y7CY0oTfPs-eanZI73X_r3vdZ_Bc",
  authDomain: "wa-rotator.firebaseapp.com",
  projectId: "wa-rotator"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const secondApp = initializeApp(firebaseConfig, "Secondary");
const secondAuth = getAuth(secondApp);

let currentUser;
let userRole = "staff";

// toast
window.showToast = function(msg, type="success") {
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.style.background = type === "error" ? "#dc2626" : "#16a34a";
  t.style.opacity = 1;
  setTimeout(()=> t.style.opacity = 0, 2000);
};

// auth
onAuthStateChanged(auth, async user => {
  if (!user) {
    window.location.href = "/login.html";
    return;
  }

  currentUser = user;

  await loadRole();
  handleAccess();
  loadUsers();
  loadText();
});

// role
async function loadRole() {
  const ref = doc(db, "roles", currentUser.uid);
  const snap = await getDoc(ref);
  if (snap.exists()) userRole = snap.data().role;
}

// access
function handleAccess() {
  if (userRole === "admin") {
    document.getElementById("admin-panel").style.display = "block";
    document.getElementById("text-panel").style.display = "block";
  }
}

// create staff
window.createStaff = async function() {
  const email = newEmail.value;
  const password = newPassword.value;

  if (!email || !password) {
    showToast("Isi semua field", "error");
    return;
  }

  try {
    const user = await createUserWithEmailAndPassword(secondAuth, email, password);
    await setDoc(doc(db, "roles", user.user.uid), { role: "staff" });
    showToast("Akun dibuat");
  } catch {
    showToast("Gagal", "error");
  }
};

// add number
window.addUser = async function() {
  const nama = nama.value.trim();
  const wa = wa.value.trim();

  if (!nama || !wa) return showToast("Isi semua field", "error");
  if (!/^[0-9]+$/.test(wa)) return showToast("Harus angka", "error");
  if (!wa.startsWith("62")) return showToast("Harus 62", "error");

  await addDoc(collection(db,"users"), {
    nama, wa_number: wa, active:true, total_leads:0, owner_uid: currentUser.uid
  });

  showToast("Ditambahkan");
  loadUsers();
};

// load users
async function loadUsers() {
  const snap = await getDocs(collection(db,"users"));
  list.innerHTML = "";

  snap.forEach(d=>{
    const data = d.data();
    if (userRole!=="admin" && data.owner_uid!==currentUser.uid) return;

    list.innerHTML += `
    <div class="user">
      <b>${data.nama}</b><br>
      ${data.wa_number}<br>
      Leads: ${data.total_leads||0}<br>

      <span class="badge ${data.active?'on':'off'}">
        ${data.active?'ON':'OFF'}
      </span><br>

      <button onclick="toggle('${d.id}',${data.active})">Toggle</button>
      ${userRole==="admin" ? `<button class="danger" onclick="deleteUser('${d.id}')">X</button>`:""}
    </div>`;
  });
}

// toggle
window.toggle = async (id,status)=>{
  await updateDoc(doc(db,"users",id),{active:!status});
  loadUsers();
};

// delete
window.deleteUser = async (id)=>{
  if(!confirm("Hapus?"))return;
  await deleteDoc(doc(db,"users",id));
  loadUsers();
};

// save text
window.saveText = async ()=>{
  const text = waText.value;
  await setDoc(doc(db,"settings","config"), { wa_text:text });
  showToast("Disimpan");
};

// load text
async function loadText(){
  const snap = await getDoc(doc(db,"settings","config"));
  if(snap.exists()) waText.value = snap.data().wa_text || "";
}

// logout
window.logout = ()=>signOut(auth);

</script>

</body>
</html>
