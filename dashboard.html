<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>WA Rotator Dashboard</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  margin: 0;
}

/* HEADER */
header {
  background: #020617;
  padding: 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* CONTAINER */
.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

/* CARD */
.card {
  background: #020617;
  border: 1px solid #1e293b;
  border-radius: 10px;
  padding: 15px;
  margin-bottom: 15px;
}

/* FORM */
.form-row {
  display: flex;
  gap: 10px;
}

input, textarea {
  flex: 1;
  padding: 10px;
  border-radius: 6px;
  border: 1px solid #1e293b;
  background: #0f172a;
  color: white;
}

textarea {
  resize: vertical;
}

/* BUTTON */
button {
  padding: 10px;
  border: none;
  border-radius: 6px;
  background: #3b82f6;
  color: white;
  cursor: pointer;
}

.danger {
  background: red;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px,1fr));
  gap: 10px;
}

/* USER */
.user-card {
  background: #020617;
  border: 1px solid #1e293b;
  padding: 12px;
  border-radius: 10px;
}

.badge {
  display: inline-block;
  padding: 3px 8px;
  border-radius: 6px;
  font-size: 12px;
}

.on { background: green; }
.off { background: red; }

/* TOAST */
#toast {
  position: fixed;
  top: 20px;
  right: 20px;
  padding: 10px;
  border-radius: 6px;
  opacity: 0;
  transition: 0.3s;
}
</style>
</head>

<body>

<header>
  <b>WA Rotator</b>
  <button onclick="logout()">Logout</button>
</header>

<div class="container">

<!-- ADMIN -->
<div class="card" id="admin-panel" style="display:none;">
  <b>Tambah Staff</b>
  <div class="form-row">
    <input id="newEmail" placeholder="Email">
    <input id="newPassword" placeholder="Password">
    <button onclick="createStaff()">Buat</button>
  </div>
</div>

<!-- TEXT -->
<div class="card" id="text-panel" style="display:none;">
  <b>Pesan WhatsApp</b><br><br>

  <textarea id="waText"></textarea><br><br>

  <button onclick="saveText()">Simpan</button>
</div>

<!-- INPUT -->
<div class="card">
  <b>Tambah Nomor CS</b>
  <div class="form-row">
    <input id="nama" placeholder="Nama CS">
    <input id="wa" placeholder="628xxxx">
    <button onclick="addUser()">Tambah</button>
  </div>
</div>

<!-- LIST -->
<div id="list" class="grid"></div>

</div>

<div id="toast"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore, collection, addDoc, getDocs, doc,
  updateDoc, getDoc, deleteDoc, setDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
  getAuth, onAuthStateChanged, signOut,
  createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

/* CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyBvot2y7CY0oTfPs-eanZI73X_r3vdZ_Bc",
  authDomain: "wa-rotator.firebaseapp.com",
  projectId: "wa-rotator"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const secondApp = initializeApp(firebaseConfig, "Secondary");
const secondAuth = getAuth(secondApp);

let role = "staff";

/* TOAST */
function toast(msg, type="ok"){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.style.background = type==="error" ? "red" : "green";
  t.style.opacity = 1;
  setTimeout(()=>t.style.opacity=0,2000);
}

/* AUTH */
onAuthStateChanged(auth, async user=>{
  if(!user) return location.href="/login.html";

  const r = await getDoc(doc(db,"roles",user.uid));
  if(r.exists()) role = r.data().role;

  if(role==="admin"){
    admin-panel.style.display="block";
    text-panel.style.display="block";
  }

  loadUsers();
  loadText();
});

/* ADD USER */
window.addUser = async ()=>{
  const nama = document.getElementById("nama").value;
  const wa = document.getElementById("wa").value;

  if(!nama || !wa) return toast("Isi semua","error");
  if(!wa.startsWith("62")) return toast("Harus diawali 62","error");

  await addDoc(collection(db,"users"),{
    nama,
    wa_number: wa,
    active: true,
    total_leads: 0
  });

  toast("Berhasil ditambah");

  loadUsers();
};

/* LOAD USERS (TANPA FILTER BIAR AMAN) */
async function loadUsers(){
  const snap = await getDocs(collection(db,"users"));
  list.innerHTML="";

  snap.forEach(d=>{
    const data = d.data();

    list.innerHTML += `
    <div class="user-card">
      <b>${data.nama}</b><br>
      ${data.wa_number}<br>
      Leads: ${data.total_leads || 0}<br>

      <span class="badge ${data.active?'on':'off'}">
        ${data.active?'ON':'OFF'}
      </span><br><br>

      <button onclick="toggle('${d.id}',${data.active})">Toggle</button>
      <button class="danger" onclick="del('${d.id}')">Hapus</button>
    </div>`;
  });
}

/* TOGGLE */
window.toggle = async(id,status)=>{
  await updateDoc(doc(db,"users",id),{active:!status});
  loadUsers();
};

/* DELETE */
window.del = async(id)=>{
  if(!confirm("Hapus?")) return;
  await deleteDoc(doc(db,"users",id));
  loadUsers();
};

/* STAFF */
window.createStaff = async ()=>{
  const email = newEmail.value;
  const pass = newPassword.value;

  const u = await createUserWithEmailAndPassword(secondAuth,email,pass);
  await setDoc(doc(db,"roles",u.user.uid),{role:"staff"});

  toast("Staff dibuat");
};

/* TEXT */
window.saveText = async()=>{
  await setDoc(doc(db,"settings","config"),{
    wa_text: waText.value
  });

  toast("Tersimpan");
};

async function loadText(){
  const s = await getDoc(doc(db,"settings","config"));
  if(s.exists()) waText.value = s.data().wa_text || "";
}

/* LOGOUT */
window.logout = ()=>signOut(auth);

</script>

</body>
</html>
