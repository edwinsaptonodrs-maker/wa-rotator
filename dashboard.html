<!DOCTYPE html>
<html>
<head>
  <title>Dashboard CS</title>
  <style>
    body { font-family: Arial; padding:20px; background:#f5f5f5; }
    .card { background:#fff; padding:15px; border-radius:10px; margin-bottom:10px; }
    .btn { padding:5px 10px; cursor:pointer; border:none; border-radius:5px; }
    .on { background:green; color:#fff; }
    .off { background:red; color:#fff; }
  </style>
</head>

<body>

<h2>Dashboard CS</h2>

<div class="card">
  <input id="nama" placeholder="Nama"><br><br>
  <input id="wa" placeholder="Nomor WA (628xxx)"><br><br>
  <button onclick="save()">Tambah CS</button>
</div>

<h3>List CS</h3>
<div id="list"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { 
  getFirestore, collection, addDoc, getDocs, 
  deleteDoc, doc, updateDoc 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBvot2y7CY0oTfPs-eanZI73X_r3vdZ_Bc",
  authDomain: "wa-rotator.firebaseapp.com",
  projectId: "wa-rotator"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// 👉 ADMIN EMAIL (ubah sesuai kamu)
const ADMIN_EMAIL = "admin@gmail.com";

let currentUser = null;

onAuthStateChanged(auth, user => {
  if (!user) {
    alert("Harus login dulu");
    window.location.href = "/login.html";
    return;
  }
  currentUser = user;
  load();
});

window.save = async function() {
  const nama = document.getElementById("nama").value;
  const wa = document.getElementById("wa").value;

  await addDoc(collection(db, "users"), {
    nama,
    wa_number: wa,
    active: true,
    total_leads: 0,
    owner_uid: currentUser.uid
  });

  load();
};

async function load() {
  const snapshot = await getDocs(collection(db, "users"));
  let html = "";

  snapshot.forEach(d => {
    const data = d.data();

    // 👉 filter: staff hanya lihat miliknya
    if (
      currentUser.email !== ADMIN_EMAIL &&
      data.owner_uid !== currentUser.uid
    ) return;

    html += `
      <div class="card">
        <b>${data.nama}</b><br>
        ${data.wa_number}<br><br>

        Status:
        <button class="btn ${data.active ? 'on':'off'}"
          onclick="toggle('${d.id}', ${data.active})">
          ${data.active ? 'ON':'OFF'}
        </button>

        <button onclick="hapus('${d.id}')">Hapus</button>
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

window.toggle = async function(id, current) {
  await updateDoc(doc(db, "users", id), {
    active: !current
  });
  load();
};

window.hapus = async function(id) {
  await deleteDoc(doc(db, "users", id));
  load();
};
</script>

</body>
</html>
