<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Dashboard WA Rotator</title>

<style>
body {
  font-family: 'Inter', sans-serif;
  background: #0f172a;
  color: white;
  margin: 0;
}

/* HEADER */
header {
  background: #020617;
  padding: 16px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid #1e293b;
}

header b {
  font-size: 18px;
}

/* CONTAINER */
.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

/* CARD */
.card {
  background: #020617;
  border: 1px solid #1e293b;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 16px;
}

/* FORM */
.form-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 10px;
}

input, textarea {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #1e293b;
  background: #0f172a;
  color: white;
}

/* BUTTON */
button {
  padding: 10px 14px;
  border: none;
  border-radius: 8px;
  background: #3b82f6;
  color: white;
  cursor: pointer;
  white-space: nowrap;
}

button:hover {
  background: #2563eb;
}

.danger {
  background: #ef4444;
}

/* USER GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px,1fr));
  gap: 12px;
}

/* USER CARD */
.user-card {
  background: #020617;
  border: 1px solid #1e293b;
  border-radius: 12px;
  padding: 14px;
}

.user-card b {
  font-size: 14px;
}

.user-card small {
  color: #94a3b8;
}

/* BADGE */
.badge {
  padding: 4px 8px;
  border-radius: 6px;
  font-size: 12px;
  display: inline-block;
  margin-top: 8px;
}

.on { background: #16a34a; }
.off { background: #dc2626; }

/* TOAST */
#toast {
  position: fixed;
  top: 20px;
  right: 20px;
  padding: 10px 14px;
  border-radius: 8px;
  opacity: 0;
  transition: 0.3s;
}

/* RESPONSIVE */
@media(max-width:600px){
  .form-row {
    flex-direction: column;
  }
}
</style>
</head>

<body>

<header>
  <b>WA Rotator</b>
  <button onclick="logout()">Logout</button>
</header>

<div class="container">

<!-- ADMIN -->
<div class="card" id="admin-panel" style="display:none;">
  <b>Tambah Staff</b>
  <div class="form-row">
    <input id="newEmail" placeholder="Email">
    <input id="newPassword" placeholder="Password">
    <button onclick="createStaff()">Buat</button>
  </div>
</div>

<!-- TEXT -->
<div class="card" id="text-panel" style="display:none;">
  <b>Pesan WhatsApp</b>
  <textarea id="waText" rows="3"></textarea>
  <div style="margin-top:10px;">
    <button onclick="saveText()">Simpan</button>
  </div>
</div>

<!-- INPUT -->
<div class="card">
  <b>Tambah Nomor CS</b>
  <div class="form-row">
    <input id="nama" placeholder="Nama CS">
    <input id="wa" placeholder="628xxxx">
    <button onclick="addUser()">Tambah</button>
  </div>
</div>

<!-- LIST -->
<div id="list" class="grid"></div>

</div>

<div id="toast"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore, collection, addDoc, getDocs, doc,
  updateDoc, getDoc, deleteDoc, setDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
  getAuth, onAuthStateChanged, signOut,
  createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBvot2y7CY0oTfPs-eanZI73X_r3vdZ_Bc",
  authDomain: "wa-rotator.firebaseapp.com",
  projectId: "wa-rotator"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const secondApp = initializeApp(firebaseConfig, "Secondary");
const secondAuth = getAuth(secondApp);

let currentUser;
let userRole = "staff";

/* TOAST */
function showToast(msg, type="success"){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.style.background = type==="error" ? "#dc2626" : "#16a34a";
  t.style.opacity = 1;
  setTimeout(()=> t.style.opacity = 0,2000);
}

/* AUTH */
onAuthStateChanged(auth, async user=>{
  if(!user) return location.href="/login.html";

  currentUser = user;

  const roleSnap = await getDoc(doc(db,"roles",user.uid));
  if(roleSnap.exists()) userRole = roleSnap.data().role;

  if(userRole==="admin"){
    document.getElementById("admin-panel").style.display="block";
    document.getElementById("text-panel").style.display="block";
  }

  loadUsers();
  loadText();
});

/* ADD USER */
window.addUser = async ()=>{
  const nama = document.getElementById("nama").value.trim();
  const wa = document.getElementById("wa").value.trim();

  if(!nama || !wa) return showToast("Isi semua field","error");
  if(!/^[0-9]+$/.test(wa)) return showToast("Harus angka","error");
  if(!wa.startsWith("62")) return showToast("Harus diawali 62","error");

  await addDoc(collection(db,"users"),{
    nama, wa_number:wa, active:true, total_leads:0, owner_uid:currentUser.uid
  });

  showToast("Berhasil ditambahkan");

  document.getElementById("nama").value="";
  document.getElementById("wa").value="";

  loadUsers();
};

/* LOAD USERS */
async function loadUsers(){
  const snap = await getDocs(collection(db,"users"));
  const list = document.getElementById("list");
  list.innerHTML="";

  snap.forEach(d=>{
    const data = d.data();

    if(userRole!=="admin" && data.owner_uid!==currentUser.uid) return;

    list.innerHTML += `
    <div class="user-card">
      <b>${data.nama}</b><br>
      <small>${data.wa_number}</small><br>
      Leads: ${data.total_leads||0}<br>

      <span class="badge ${data.active?'on':'off'}">
        ${data.active?'ON':'OFF'}
      </span>

      <div style="margin-top:10px; display:flex; gap:6px;">
        <button onclick="toggle('${d.id}',${data.active})">Toggle</button>
        ${userRole==="admin" ? `<button class="danger" onclick="deleteUser('${d.id}')">Hapus</button>` : ""}
      </div>
    </div>`;
  });
}

/* TOGGLE */
window.toggle = async(id,status)=>{
  await updateDoc(doc(db,"users",id),{active:!status});
  loadUsers();
};

/* DELETE */
window.deleteUser = async(id)=>{
  if(!confirm("Hapus?")) return;
  await deleteDoc(doc(db,"users",id));
  loadUsers();
};

/* STAFF */
window.createStaff = async ()=>{
  const email = newEmail.value;
  const pass = newPassword.value;

  if(!email||!pass) return showToast("Isi semua","error");

  const u = await createUserWithEmailAndPassword(secondAuth,email,pass);
  await setDoc(doc(db,"roles",u.user.uid),{role:"staff"});

  showToast("Staff dibuat");
};

/* TEXT */
window.saveText = async()=>{
  await setDoc(doc(db,"settings","config"),{wa_text:waText.value});
  showToast("Tersimpan");
};

async function loadText(){
  const snap = await getDoc(doc(db,"settings","config"));
  if(snap.exists()) waText.value = snap.data().wa_text || "";
}

/* LOGOUT */
window.logout = ()=>signOut(auth);

</script>

</body>
</html>
