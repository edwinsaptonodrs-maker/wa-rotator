<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Login - WA Rotator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: white;
    }

    .wrapper {
      display: grid;
      grid-template-columns: 1fr 1fr;
      height: 100vh;
    }

    /* LEFT SIDE */
    .left {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px;
      background: linear-gradient(135deg, #1e293b, #020617);
    }

    .branding {
      max-width: 350px;
    }

    .branding h1 {
      margin-bottom: 10px;
    }

    .branding p {
      opacity: 0.7;
      font-size: 14px;
    }

    /* RIGHT SIDE */
    .right {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 350px;
      background: #020617;
      padding: 30px;
      border-radius: 14px;
      border: 1px solid #1e293b;
    }

    .card h2 {
      margin-bottom: 20px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: 1px solid #1e293b;
      background: #020617;
      color: white;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #3b82f6;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #2563eb;
    }

    .error {
      color: #ef4444;
      text-align: center;
      margin-top: 10px;
      font-size: 14px;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      .wrapper {
        grid-template-columns: 1fr;
      }

      .left {
        display: none;
      }

      .right {
        height: 100vh;
      }
    }
  </style>
</head>

<body>

<div class="wrapper">

  <!-- LEFT -->
  <div class="left">
    <div class="branding">
      <h1>WA Rotator</h1>
      <p>Sistem distribusi lead otomatis untuk tim CS kamu.  
      Lebih cepat, lebih rapi, dan terukur.</p>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="card">
      <h2>Masuk</h2>

      <input id="email" placeholder="Email">
      <input id="password" type="password" placeholder="Password">

      <button onclick="login()" id="btnLogin">Masuk</button>

      <div class="error" id="error"></div>
    </div>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// 🔥 GANTI CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyBvot2y7CY0oTfPs-eanZI73X_r3vdZ_Bc",
  authDomain: "wa-rotator.firebaseapp.com",
  projectId: "wa-rotator"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = async function() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const btn = document.getElementById("btnLogin");
  const error = document.getElementById("error");

  error.innerText = "";
  btn.innerText = "Loading...";
  btn.disabled = true;

  try {
    await signInWithEmailAndPassword(auth, email, password);
    window.location.href = "/dashboard.html";
  } catch {
    error.innerText = "Email atau password salah";
  }

  btn.innerText = "Masuk";
  btn.disabled = false;
};

</script>

</body>
</html>
