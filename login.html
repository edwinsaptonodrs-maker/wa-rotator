<!DOCTYPE html>
<html>
<head>
  <title>Login CS</title>
</head>
<body>
  <h2>Login Staff</h2>
  <input id="email" placeholder="Email"><br><br>
  <input id="password" type="password" placeholder="Password"><br><br>
  <button onclick="login()">Login</button>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBvot2y7CY0oTfPs-eanZI73X_r3vdZ_Bc",
      authDomain: "wa-rotator.firebaseapp.com",
      projectId: "wa-rotator",
      storageBucket: "wa-rotator.firebasestorage.app",
      messagingSenderId: "505170669713",
      appId: "1:505170669713:web:e03b27c58d4f83446c8f30"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    window.login = async function() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      try {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = "dashboard.html";
      } catch (err) {
        alert("Login gagal: " + err.message);
      }
    }
  </script>
</body>
</html>
