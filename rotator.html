<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Redirecting...</title>

<!-- BIAR CEPAT -->
<meta http-equiv="refresh" content="0;url=about:blank">

<style>
body {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: #0f172a;
  color: white;
  font-family: Arial;
}
</style>
</head>

<body>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore, collection, getDocs, doc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBvot2y7CY0oTfPs-eanZI73X_r3vdZ_Bc",
  authDomain: "wa-rotator.firebaseapp.com",
  projectId: "wa-rotator"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

(async () => {

  try {

    const snap = await getDocs(collection(db, "users"));

    let users = [];

    snap.forEach(d => {
      const data = d.data();
      if (data.active) {
        users.push({ id: d.id, ...data });
      }
    });

    if (users.length === 0) {
      document.body.innerHTML = "Tidak ada CS aktif";
      return;
    }

    // RANDOM CEPAT
    const pick = users[Math.floor(Math.random() * users.length)];

    // AMBIL PESAN
    const textSnap = await getDocs(collection(db, "settings"));
    let text = "Halo, saya tertarik";

    textSnap.forEach(d => {
      if (d.id === "config") {
        text = d.data().wa_text || text;
      }
    });

    // UPDATE LEADS (BACKGROUND, TANPA NUNGGU)
    updateDoc(doc(db, "users", pick.id), {
      total_leads: (pick.total_leads || 0) + 1
    });

    // 🚀 REDIRECT CEPAT
    window.location.href =
      `https://wa.me/${pick.wa_number}?text=${encodeURIComponent(text)}`;

  } catch (e) {
    document.body.innerHTML = "Error rotator";
    console.error(e);
  }

})();

</script>
</body>
</html>
