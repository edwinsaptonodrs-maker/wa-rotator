<!DOCTYPE html>
<html>
<head>
  <title>Redirect...</title>
</head>
<body>
  <h3>Loading...</h3>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBvot2y7CY0oTfPs-eanZI73X_r3vdZ_Bc",
  authDomain: "wa-rotator.firebaseapp.com",
  projectId: "wa-rotator"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function run() {

  // 🔹 ambil semua CS aktif
  const snapshot = await getDocs(collection(db, "users"));
  let activeUsers = [];

  snapshot.forEach(doc => {
    const data = doc.data();
    if (data.active) activeUsers.push(data);
  });

  if (activeUsers.length === 0) {
    alert("Tidak ada CS aktif");
    return;
  }

  // 🔹 pilih random
  const selected = activeUsers[Math.floor(Math.random() * activeUsers.length)];

  // 🔹 ambil teks dari dashboard
  const ref = doc(db, "settings", "config");
  const snap = await getDoc(ref);

  let pesan = "Halo";

  if (snap.exists()) {
    pesan = snap.data().wa_text;
  }

  const encoded = encodeURIComponent(pesan);

  // 🔹 simpan lead
  await addDoc(collection(db, "leads"), {
    nama: selected.nama,
    wa_number: selected.wa_number,
    timestamp: new Date(),
    source: "facebook"
  });

  // 🔹 redirect WA
  window.location.href =
    "https://wa.me/" + selected.wa_number +
    "?text=" + encoded;
}

run();
</script>

</body>
</html>
